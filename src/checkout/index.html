<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="css/style.css" />

    <script src="../js/checkout.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header">
    </header>

    <main class="divider">
      <section class="products">
        <h2>Review & Place your Order</h2>

        <form id="checkout-form">
          <h3>Customer Name</h3>

          <label for="firstName">First Name</label>
          <input type="text" id="firstName" name="firstName" required />

          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" name="lastName" required />

          <h3>Address</h3>

          <label for="street">Street Address</label>
          <input type="text" id="street" name="street" required />

          <label for="city">City</label>
          <input type="text" id="city" name="city" required />

          <label for="state">State</label>
          <input type="text" id="state" name="state" required />

          <label for="zip">Zip Code</label>
          <input type="text" id="zip" name="zip" required />

          <h3>Payment</h3>

          <label for="cardNumber">Credit Card Number</label>
          <input type="text" id="cardNumber" name="cardNumber" required />

          <label for="expiration">Expiration Date</label>
          <input type="text" id="expiration" name="expiration" required />


          <label for="securityCode">Security Code</label>
          <input type="text" id="securityCode" name="securityCode" required />

          <button type="submit">Checkout</button>
        </form>

        <div class="order-summary">
          <h3>Order Summary</h3>
          <p>Subtotal: <span id="subtotal">$0.00</span></p>
          <p>Tax: <span id="tax">$0.00</span></p>
          <p>Shipping Estimate: <span id="shipping">$0.00</span></p>
          <p>Order Total: <span id="order-total">$0.00</span></p>
        </div>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
